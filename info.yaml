# Tiny Tapeout project information
project:
  title:        "4-bit ALU"
  author:       "Anoop"
  discord:      "anoopdeekshith"
  description:  "A 4-bit ALU supporting ADD, SUB, AND, OR, XOR, NOT, left shift, and right shift operations"
  language:     "Verilog"
  clock_hz:     0
  tiles: "1x1"
  top_module:  "tt_um_example"
  source_files:
    - "project.v"

pinout:
  # Inputs
  ui[0]: "Operand A bit 0"
  ui[1]: "Operand A bit 1"
  ui[2]: "Operand A bit 2"
  ui[3]: "Operand A bit 3"
  ui[4]: "Operand B bit 0"
  ui[5]: "Operand B bit 1"
  ui[6]: "Operand B bit 2"
  ui[7]: "Operand B bit 3"
  # Outputs
  uo[0]: "Result bit 0"
  uo[1]: "Result bit 1"
  uo[2]: "Result bit 2"
  uo[3]: "Result bit 3"
  uo[4]: "Zero flag"
  uo[5]: "Carry flag"
  uo[6]: "Negative flag"
  uo[7]: ""
  # Bidirectional pins
  uio[0]: "Opcode bit 0"
  uio[1]: "Opcode bit 1"
  uio[2]: "Opcode bit 2"
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
